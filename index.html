<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%2250%25%22 x=%2250%25%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2275%22>🏰</text></svg>">
    <title>Dungeon Explorer - Menu Principal</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --grid-size: 40px 40px;
            --grid-line: 1px;
            --grid-base-color: rgba(0, 255, 65, 0.05);
        }

        @keyframes wanderingGlow {
            0%   { background-position: 0% 20%; }
            25%  { background-position: 100% 50%; }
            50%  { background-position: 80% 100%; }
            75%  { background-position: 20% 80%; }
            100% { background-position: 0% 20%; }
        }

        html {
            background-color: #050505;
        }

        body {
            background-color: #050505;
            background-image:
                linear-gradient(var(--grid-base-color) var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, var(--grid-base-color) var(--grid-line), transparent var(--grid-line));
            background-size: var(--grid-size);
            background-attachment: fixed;

            color: #ccc;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;

            background-image: radial-gradient(
                circle,
                rgba(0, 255, 65, 0.8) 0%,
                rgba(0, 255, 65, 0.2) 15%,
                transparent 35%
            );
            background-size: 200% 200%;
            animation: wanderingGlow 30s ease-in-out infinite;

            -webkit-mask-image:
                linear-gradient(black var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, black var(--grid-line), transparent var(--grid-line));
            -webkit-mask-size: var(--grid-size);
            mask-image:
                linear-gradient(black var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, black var(--grid-line), transparent var(--grid-line));
            mask-size: var(--grid-size);
        }

        .epic-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            background-color: #050505;
            background-image:
                linear-gradient(rgba(255, 75, 75, 0.1) var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, rgba(255, 75, 75, 0.1) var(--grid-line), transparent var(--grid-line));
            background-size: var(--grid-size);
        }

        .epic-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(
                circle,
                rgba(255, 75, 75, 0.8) 0%,
                rgba(255, 75, 75, 0.2) 15%,
                transparent 35%
            );
            background-size: 200% 200%;
            animation: wanderingGlow 30s ease-in-out infinite;
            -webkit-mask-image:
                linear-gradient(black var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, black var(--grid-line), transparent var(--grid-line));
            -webkit-mask-size: var(--grid-size);
            mask-image:
                linear-gradient(black var(--grid-line), transparent var(--grid-line)),
                linear-gradient(90deg, black var(--grid-line), transparent var(--grid-line));
            mask-size: var(--grid-size);
        }

        body.epic-mode .epic-overlay {
            opacity: 1;
        }

        .menu-container {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            padding: 40px 50px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 65, 0.05);
            text-align: center;
            position: relative;
            transition: box-shadow 0.5s ease, border-color 0.5s ease;
            overflow: hidden; /* Empêche les barres de déborder dans les coins */
        }

        /* Garantie d'égalité : Les deux barres font exactement 4px
           et sont superposées mathématiquement
        */
        .menu-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px; /* Taille fixe */
            background: #00ff41;
            z-index: 1;
        }

        .menu-container::after {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 4px; /* Taille strictement identique */
            background: #ff4b4b;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2; /* Recouvre parfaitement la barre verte */
        }

        body.epic-mode .menu-container::after {
            width: 100%;
        }
        body.epic-mode .menu-container {
            border-color: rgba(255, 75, 75, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 75, 75, 0.15);
        }

        h1 {
            color: #00ff41; margin: 0 0 10px 0; font-size: 2.4em;
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.4); letter-spacing: 2px;
            transition: color 0.5s, text-shadow 0.5s;
        }

        body.epic-mode h1 {
            color: #ff4b4b;
            text-shadow: 0 0 15px rgba(255, 75, 75, 0.4);
        }

        p.subtitle { color: #888; margin-bottom: 35px; font-size: 1em; text-transform: uppercase; letter-spacing: 3px; }

        .level-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            border: 1px solid #333;
            border-left: 4px solid #444;
            border-radius: 4px;
            padding: 16px 20px;
            margin-bottom: 12px;
            font-family: inherit;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .lvl-name { text-align: left; transition: color 0.2s; }
        .lvl-size { font-size: 0.85em; color: #555; font-weight: normal; transition: color 0.2s; }

        .level-btn:hover {
            background: rgba(0, 255, 65, 0.05);
            border-color: rgba(0, 255, 65, 0.3);
            border-left: 4px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.15), inset 0 0 10px rgba(0, 255, 65, 0.05);
            transform: translateX(4px);
        }

        .level-btn:hover .lvl-name { color: #fff; }
        .level-btn:hover .lvl-size { color: #00ff41; }
        .level-btn:active { transform: translateX(2px); }

        .level-btn.epic {
            border-left: 4px solid #882222;
            justify-content: center;
            margin-top: 25px;
        }
        .level-btn.epic:hover {
            background: rgba(255, 75, 75, 0.05);
            border-color: rgba(255, 75, 75, 0.3);
            border-left: 4px solid #ff4b4b;
            box-shadow: 0 0 15px rgba(255, 75, 75, 0.15);
        }
        .level-btn.epic:hover .lvl-name { color: #ff4b4b; }

        .credits {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85em;
            color: #555;
            line-height: 1.8;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .credits strong { color: #00ff41; letter-spacing: 1px; transition: color 0.5s; }

        body.epic-mode .credits strong { color: #ff4b4b; }
    </style>
</head>
<body>
    <div class="epic-overlay"></div>

    <div class="menu-container">
        <h1>DUNGEON EXPLORER</h1>
        <p class="subtitle">Sélectionnez une mission</p>

        <button class="level-btn" onclick="window.location.href='game.html?donjon16.txt'">
            <span class="lvl-name">Niveau 1 : Infiltration</span>
            <span class="lvl-size">[4x4]</span>
        </button>
        <button class="level-btn" onclick="window.location.href='game.html?donjon32.txt'">
            <span class="lvl-name">Niveau 2 : Exploration</span>
            <span class="lvl-size">[8x4]</span>
        </button>
        <button class="level-btn" onclick="window.location.href='game.html?donjon64.txt'">
            <span class="lvl-name">Niveau 3 : Labyrinthe</span>
            <span class="lvl-size">[8x8]</span>
        </button>

        <button id="epicButton" class="level-btn epic" onclick="window.location.href='game.html?donjon_epic.txt'">
            <span class="lvl-name">❗ Mission Épique : Le Seigneur Noir</span>
        </button>

        <div class="credits">
            <strong>Samy ALLIA - L1 Informatique</strong><br>
            Code du jeu créé par Samy ALLIA<br>
            Jeu exporté en version Web avec l'aide d'IA générative
        </div>
    </div>

    <script>
        const epicBtn = document.getElementById('epicButton');

        epicBtn.addEventListener('mouseenter', () => {
            document.body.classList.add('epic-mode');
        });

        epicBtn.addEventListener('mouseleave', () => {
            document.body.classList.remove('epic-mode');
        });
    </script>
</body>
</html>
